<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=1920" />
<title>White paper — sample (landscape) — Point One Zero</title>
<link rel="icon" href="../../assets/favicon.svg" />
<link rel="stylesheet" href="../../colors_and_type.css" />
<link rel="stylesheet" href="white-paper-landscape-styles.css" />
<style>
  body { background: #ededed; margin: 0; padding: 56px 0; }
  .wpl-stack { display: flex; flex-direction: column; align-items: center; gap: 28px; }
  .wpl-page { box-shadow: 0 24px 64px -16px rgba(15, 17, 20, 0.10); background: var(--canvas); }

  @media print {
    body { background: white; padding: 0; }
    .wpl-stack { gap: 0; }
    .wpl-page { box-shadow: none; page-break-after: always; }
    .wpl-page:last-child { page-break-after: auto; }
    @page { size: 1920px 1080px; margin: 0; }
  }
</style>

<!--
================================================================
  WHITE PAPER — SAMPLE COMPOSITION (LANDSCAPE)
  ================================================================
  Point One Zero design system · 1920 × 1080 · 14 pages
  16:9 PowerPoint default — best exported via "Export as PPTX"

  This file COMPOSES the WPL* components from
  white-paper-landscape-pages.jsx into a sequential landscape
  white paper. Visible content is "The founder's playbook"
  sample; replace component props with your own.

  See LANDSCAPE_SPEC.md alongside this file for component prop
  signatures and copy budgets.

  HARD RULES — never touch:
  - Do NOT modify white-paper-landscape-pages.jsx, the styles
    file, or colors_and_type.css.
  - Do NOT invent new WPL* components.
  - Do NOT change canvas dimensions (1920 × 1080).
  - Brand budget: ONE .brand-word on cover, ONE on back cover.
  - One WPLBodyFeaturedStat per chapter.
  - Do NOT rename the @section JSX comments.
  - Do NOT mix WP* (portrait) and WPL* (landscape) in one file.

  EXPORT:
  - Native PPTX: invoke "Export as PPTX (editable)".
  - Flat PDF: browser → Save as PDF (landscape, 16:9, no margins).
================================================================
-->

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>

<div id="root"></div>

<script type="text/babel" src="white-paper-landscape-pages.jsx"></script>

<script type="text/babel" data-presets="react">
function WhitePaperLandscape() {
  return (
    <div className="wpl-stack">

      {/* @section cover ============================================ */}
      <WPLCover />

      {/* @section toc ============================================== */}
      <WPLToc page={2} />

      {/* @section chapter_01 ======================================= */}
      <WPLChapter
        chapterNum="Chapter 01"
        title="Lifecycle"
        brandWord="rebooted"
        lead="Five stages, compressed. The window between idea and revenue is no longer measured in years; the work is measured in evidence per week."
        page={3}
        meta="Building an AI-native startup"
      />

      {/* @section body_01_stats ==================================== */}
      <WPLBodyStats page={4} section="Chapter 01 · The startup lifecycle, rebooted" />

      {/* @section body_01_standard ================================= */}
      <WPLBodyStandard page={5} section="Chapter 01 · The startup lifecycle, rebooted" />

      {/* @section chapter_03 ======================================= */}
      <WPLChapter
        chapterNum="Chapter 03"
        title="Idea"
        brandWord="stage"
        lead="Every startup founder starts from the same place: a problem they can't stop thinking about. Discipline of not building until evidence justifies it."
        page={8}
        meta="Building an AI-native startup"
      />

      {/* @section body_03_bullets ================================== */}
      <WPLBodyBullets page={9} section="Chapter 03 · Idea stage" />

      {/* @section body_03_numbered ================================= */}
      <WPLBodyNumbered page={10} section="Chapter 03 · Idea stage" />

      {/* @section body_03_pullquote ================================ */}
      <WPLBodyPullquote page={12} section="Chapter 03 · Idea stage" />

      {/* @section body_04_callout ================================== */}
      <WPLBodyCallout page={17} section="Chapter 04 · MVP stage" />

      {/* @section body_04_figure =================================== */}
      <WPLBodyFigure page={18} section="Chapter 04 · MVP stage" />

      {/* @section chapter_06 ======================================= */}
      <WPLChapter
        chapterNum="Chapter 06"
        title="Scale"
        brandWord="stage"
        lead="Lean is no longer scrappy. At scale, AI-native startups stay structurally small on purpose — and extend leverage instead of headcount."
        page={25}
        meta="Building an AI-native startup"
      />

      {/* @section body_06_featured_stat ============================ */}
      <WPLBodyFeaturedStat page={26} section="Chapter 06 · Scale stage" />

      {/* @section resources ======================================== */}
      <WPLResources page={33} />

      {/* @section back_cover ======================================= */}
      <WPLBack />

    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<WhitePaperLandscape />);
</script>

</body>
</html>
