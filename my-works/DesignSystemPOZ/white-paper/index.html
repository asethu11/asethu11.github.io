<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=1280" />
<title>White paper template — Point One Zero</title>
<link rel="icon" href="../assets/favicon.svg" />
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="white-paper-styles.css" />
<style>
  body { background: #f5f5f5; margin: 0; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>

<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="white-paper-pages.jsx"></script>

<script type="text/babel" data-presets="react">
const PAGE_W = 1080;
const PAGE_H = 1440;

function App() {
  return (
    <DesignCanvas
      title="White paper template"
      subtitle="1080 × 1440 portrait pages · maps to PowerPoint portrait or Letter print · built on the Point One Zero token system"
    >
      <DCSection
        id="covers"
        title="Covers & front matter"
        subtitle="The page a reader sees first, and the one that orients them once they're inside."
      >
        <DCArtboard id="cover" label="Cover" width={PAGE_W} height={PAGE_H}>
          <WPCover />
        </DCArtboard>
        <DCArtboard id="toc" label="Table of contents" width={PAGE_W} height={PAGE_H}>
          <WPToc />
        </DCArtboard>
      </DCSection>

      <DCSection
        id="chapters"
        title="Chapter dividers"
        subtitle="Drop one in front of every chapter. Big chapter number, one-line abstract — that's it."
      >
        <DCArtboard id="ch1" label="Chapter divider · pillar" width={PAGE_W} height={PAGE_H}>
          <WPChapter
            chapterNum="Chapter 03"
            title="Idea"
            brandWord="stage"
            lead="Every startup founder starts from the same place: a problem they can't stop thinking about. Startup success in 2026 requires the discipline of not building until the evidence justifies it."
            page={8}
          />
        </DCArtboard>
        <DCArtboard id="ch2" label="Chapter divider · short" width={PAGE_W} height={PAGE_H}>
          <WPChapter
            chapterNum="Chapter 06"
            title="Scale"
            brandWord="stage"
            lead="Lean is no longer scrappy. At scale, AI-native startups stay structurally small on purpose — and extend leverage instead of headcount."
            page={25}
          />
        </DCArtboard>
      </DCSection>

      <DCSection
        id="body"
        title="Body layouts"
        subtitle="The reading pages. Every variant uses the same chrome — eyebrow, headline, body, page mark — and varies only in what the body holds."
      >
        <DCArtboard id="body-standard" label="Standard · drop cap opener" width={PAGE_W} height={PAGE_H}>
          <WPBodyStandard />
        </DCArtboard>

        <DCArtboard id="body-bullets" label="Body · bullet list" width={PAGE_W} height={PAGE_H}>
          <WPBodyBullets />
        </DCArtboard>

        <DCArtboard id="body-numbered" label="Body · numbered list" width={PAGE_W} height={PAGE_H}>
          <WPBodyNumbered />
        </DCArtboard>

        <DCArtboard id="body-pullquote" label="Body · pull quote" width={PAGE_W} height={PAGE_H}>
          <WPBodyPullquote />
        </DCArtboard>

        <DCArtboard id="body-stats" label="Body · stat row" width={PAGE_W} height={PAGE_H}>
          <WPBodyStats />
        </DCArtboard>

        <DCArtboard id="body-featured-stat" label="Body · featured number" width={PAGE_W} height={PAGE_H}>
          <WPBodyFeaturedStat />
        </DCArtboard>

        <DCArtboard id="body-two-col" label="Body · two column" width={PAGE_W} height={PAGE_H}>
          <WPBodyTwoCol />
        </DCArtboard>

        <DCArtboard id="body-figure" label="Body · figure placeholder" width={PAGE_W} height={PAGE_H}>
          <WPBodyFigure />
        </DCArtboard>

        <DCArtboard id="body-callout" label="Body · callout box" width={PAGE_W} height={PAGE_H}>
          <WPBodyCallout />
        </DCArtboard>
      </DCSection>

      <DCSection
        id="back"
        title="Back matter"
        subtitle="Where the reader lands at the end."
      >
        <DCArtboard id="resources" label="Resources & references" width={PAGE_W} height={PAGE_H}>
          <WPResources />
        </DCArtboard>
        <DCArtboard id="back-cover" label="Back cover" width={PAGE_W} height={PAGE_H}>
          <WPBack />
        </DCArtboard>
      </DCSection>

      <DCPostIt x={120} y={120}>
        14 page templates. 1080 × 1440 (PowerPoint portrait / 8.5×11 ratio). Every layout shares the same header/footer chrome — eyebrow → headline → body — so chapters read as one document regardless of which mix you choose.
      </DCPostIt>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

</body>
</html>
