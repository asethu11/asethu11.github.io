<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=1280" />
<title>White paper — sample (portrait) — Point One Zero</title>
<link rel="icon" href="../../assets/favicon.svg" />
<link rel="stylesheet" href="../../colors_and_type.css" />
<link rel="stylesheet" href="white-paper-styles.css" />
<style>
  body { background: #ededed; margin: 0; padding: 56px 0; }
  .wp-stack { display: flex; flex-direction: column; align-items: center; gap: 28px; }
  .wp-page { box-shadow: 0 24px 64px -16px rgba(15, 17, 20, 0.10); background: var(--canvas); }

  @media print {
    body { background: white; padding: 0; }
    .wp-stack { gap: 0; }
    .wp-page { box-shadow: none; page-break-after: always; }
    .wp-page:last-child { page-break-after: auto; }
    @page { size: 1080px 1440px; margin: 0; }
  }
</style>

<!--
================================================================
  WHITE PAPER — SAMPLE COMPOSITION (PORTRAIT)
  ================================================================
  Point One Zero design system · 1080 × 1440 · 16 pages

  This file COMPOSES the WP* components from white-paper-pages.jsx
  into a sequential white paper. The visible content is "The
  founder's playbook" sample; replace component props with your
  own content.

  See SPEC.md alongside this file for component prop signatures
  and copy budgets.

  HARD RULES — never touch:
  - Do NOT modify white-paper-pages.jsx, white-paper-styles.css,
    or colors_and_type.css. They are the design language.
  - Do NOT invent new WP* components — if you need a new layout,
    propose it as a kit update.
  - Do NOT change canvas dimensions (1080 × 1440).
  - Do NOT exceed the brand budget: ONE .brand-word on the cover
    title, ONE on the back cover, ONE WPBodyFeaturedStat per
    chapter.
  - Do NOT rename or remove the @section JSX comments.
  - Page numbers must increment monotonically; pass `page` prop.

  TO FILL:
  - Edit the props in each <WP... /> call.
  - To add more body pages, duplicate any WPBody* line with new
    props and bump page numbers.
  - To add or remove chapters, edit the WPToc items array and
    insert/remove WPChapter dividers.

  EXPORT:
  - Browser → Save as PDF (Letter portrait, no margins,
    background graphics on).
================================================================
-->

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>

<div id="root"></div>

<script type="text/babel" src="white-paper-pages.jsx"></script>

<script type="text/babel" data-presets="react">
const TOTAL_PAGES = 16;

function WhitePaper() {
  return (
    <div className="wp-stack">

      {/* @section cover ============================================ */}
      <WPCover
        eyebrow="A Point One Zero white paper"
        title="The founder's playbook"
        brandWord="rebooted"
        brandWordTail=" for 2026."
        sub="Building an AI-native startup, stage by stage. How research, agentic coding, and workflow automation are compressing the path from idea to scale."
        authors="Maya Lindgren, Theo Aaron"
        date="May 2026"
        version="Vol. 01 · No. 03"
        number="WP-026-03"
      />

      {/* @section toc ============================================== */}
      <WPToc page={2} items={[
        { num: '01', title: 'The startup lifecycle, rebooted', page: 3 },
        { num: '02', title: 'What it means to be a founder', page: 5 },
        { num: '03', title: 'Idea stage',                       page: 8 },
        { num: '04', title: 'MVP stage',                        page: 14 },
        { num: '05', title: 'Growth stage',                     page: 20 },
        { num: '06', title: 'Scale stage',                      page: 25 },
        { num: '07', title: 'Same job, new rules',              page: 31 },
        { num: '08', title: 'Resources',                        page: 33 },
      ]} />

      {/* @section chapter_01 ======================================= */}
      <WPChapter
        chapterNum="Chapter 01"
        title="The startup lifecycle"
        brandWord="rebooted"
        lead="Five stages, compressed. The window between idea and revenue is no longer measured in years; the work is measured in evidence per week."
        page={3}
      />

      {/* @section body_01_stats ==================================== */}
      <WPBodyStats
        page={4}
        section="Chapter 01 · The startup lifecycle, rebooted"
      />

      {/* @section chapter_02 ======================================= */}
      <WPChapter
        chapterNum="Chapter 02"
        title="What it means"
        brandWord="to be a founder"
        lead="The founder's job changes per stage. The mistake is treating the role as fixed: a researcher in week one, a hiring manager in year three."
        page={5}
      />

      {/* @section body_02_bullets ================================== */}
      <WPBodyBullets
        page={6}
        section="Chapter 02 · What it means to be a founder"
      />

      {/* @section body_02_figure =================================== */}
      <WPBodyFigure
        page={7}
        section="Chapter 02 · What it means to be a founder"
      />

      {/* @section chapter_03 ======================================= */}
      <WPChapter
        chapterNum="Chapter 03"
        title="Idea"
        brandWord="stage"
        lead="Every startup founder starts from the same place: a problem they can't stop thinking about. Startup success in 2026 requires the discipline of not building until the evidence justifies it."
        page={8}
      />

      {/* @section body_03_standard ================================= */}
      <WPBodyStandard
        page={9}
        section="Chapter 03 · Idea stage"
      />

      {/* @section body_03_numbered ================================= */}
      <WPBodyNumbered
        page={11}
        section="Chapter 03 · Idea stage"
      />

      {/* @section body_03_pullquote ================================ */}
      <WPBodyPullquote
        page={12}
        section="Chapter 03 · Idea stage"
      />

      {/* @section body_04_callout ================================== */}
      <WPBodyCallout
        page={17}
        section="Chapter 04 · MVP stage"
      />

      {/* @section body_05_twocol =================================== */}
      <WPBodyTwoCol
        page={20}
        section="Chapter 05 · Growth stage"
      />

      {/* @section chapter_06 ======================================= */}
      <WPChapter
        chapterNum="Chapter 06"
        title="Scale"
        brandWord="stage"
        lead="Lean is no longer scrappy. At scale, AI-native startups stay structurally small on purpose — and extend leverage instead of headcount."
        page={25}
      />

      {/* @section body_06_featured_stat ============================ */}
      <WPBodyFeaturedStat
        page={26}
        section="Chapter 06 · Scale stage"
      />

      {/* @section resources ======================================== */}
      <WPResources page={33} />

      {/* @section back_cover ======================================= */}
      <WPBack />

    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<WhitePaper />);
</script>

</body>
</html>
