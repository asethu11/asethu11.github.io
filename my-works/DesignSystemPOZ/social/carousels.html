<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>SM carousel system — Point One Zero</title>
<link rel="icon" href="../assets/favicon.svg" />
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="carousel-system.css" />
<style>
  /* Canvas wrapper only — the carousel system lives in carousel-system.css */
  html, body { margin: 0; background: #f5f4f0; min-height: 100vh; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="carousel-templates.jsx"></script>
</head>
<body>

<div id="root"></div>

<script type="text/babel">
  const App = () => (
    <DesignCanvas>

      {/* ================== A — Manifesto ================== */}
      <DCSection
        id="manifesto"
        title="Carousel · Manifesto"
        subtitle="On the name behind the firm — 6 slides · 1080 × 1350"
      >
        <DCArtboard id="m-1" label="01 · Cover" width={1080} height={1350}>
          <CoverSlide
            page={1} total={6}
            eyebrow="An AI-native firm · Princeton, NJ"
            vol="Vol. 01"
            headline="On the name. Three words. One firm."
            brandWord="One firm"
            lead="The manifesto, in three definitions. POINT — the intersection. ONE — the collective. ZERO — the model. Together they describe a way of working."
          />
        </DCArtboard>

        <DCArtboard id="m-2" label="02 · POINT" width={1080} height={1350}>
          <DefinitionSlide
            page={2} total={6}
            eyebrow="The intersection"
            defNumber="01"
            word="POINT"
            definition="The sharper tip of the sphere — where strategy, design, and AI meet on a single, narrow problem."
            body="Most engagements collapse on the surface area. The POINT is the discipline of working one cross-section at a time: one decision, one user, one motion, one quarter."
            footnote="From the firm's manifesto, §1 · 2025"
          />
        </DCArtboard>

        <DCArtboard id="m-3" label="03 · ONE" width={1080} height={1350}>
          <DefinitionSlide
            page={3} total={6}
            eyebrow="The collective"
            defNumber="02"
            word="ONE"
            definition="One team — domain experts, strategists, designers, and engineers — working as a single pod, not a relay race."
            body="The org chart is flat by design. There is no handoff between research and design, between design and engineering. The work compounds in the same room."
            footnote="From the firm's manifesto, §2 · 2025"
          />
        </DCArtboard>

        <DCArtboard id="m-4" label="04 · ZERO" width={1080} height={1350}>
          <DefinitionSlide
            page={4} total={6}
            eyebrow="The model"
            defNumber="03"
            word="ZERO"
            definition="Zero-based. Lean. Distilled. AI-native. The agent library is the compounding asset, not the headcount."
            body="Every engagement leaves behind reusable agents — small, narrow, well-tested. The next engagement starts further along than the last. The library is the moat."
            footnote="From the firm's manifesto, §3 · 2025"
          />
        </DCArtboard>

        <DCArtboard id="m-5" label="05 · Pull quote" width={1080} height={1350}>
          <QuoteSlide
            page={5} total={6}
            eyebrow="On restraint"
            quote="The model is lean. The team is small. The accent is a noun. Restraint is the design — and the design is the brief."
            attribution="From the firm's manifesto"
            source="§ 4 · pointonezero.com/manifesto"
          />
        </DCArtboard>

        <DCArtboard id="m-6" label="06 · CTA" width={1080} height={1350}>
          <CTASlide
            page={6} total={6}
            eyebrow="Engage"
            headline="Bring us a hard, narrow problem."
            brandWord="hard, narrow"
            body="Six weeks. One pod. A prototype that proves or kills the thesis."
            action="Let's talk"
            url="pointonezero.com"
          />
        </DCArtboard>
      </DCSection>

      {/* ================== B — Outcomes ================== */}
      <DCSection
        id="outcomes"
        title="Carousel · Outcomes"
        subtitle="A year of restraint, measured — 6 slides · 1080 × 1350"
      >
        <DCArtboard id="o-1" label="01 · Cover" width={1080} height={1350}>
          <CoverSlide
            page={1} total={6}
            eyebrow="Field notes · Annual review"
            vol="Vol. 02"
            headline="A year of restraint, measured."
            brandWord="measured"
            lead="Four headline numbers from twelve sprint engagements. The data is on the back of the envelope; the discipline is in the front."
          />
        </DCArtboard>

        <DCArtboard id="o-2" label="02 · 17 hrs" width={1080} height={1350}>
          <StatSlide
            page={2} total={6}
            figure="01"
            value="17"
            suffix="hrs"
            label="From a brief on a Monday to a working prototype on a Tuesday."
            body="Median across the last twelve sprints. Measured from the kickoff call to the first runnable artifact on staging. Excludes scoping and contracting."
            source="Internal · Sprint log · Q1 2026"
          />
        </DCArtboard>

        <DCArtboard id="o-3" label="03 · 10×" width={1080} height={1350}>
          <StatSlide
            page={3} total={6}
            figure="02"
            value="10"
            suffix="×"
            label="Faster than the consulting baseline our clients arrived with."
            body="Benchmark is the same scope quoted by the previous incumbent — typically a six-to-nine-month build. We finish the same surface in five to eight weeks."
            source="Internal · Engagement review · 2026"
          />
        </DCArtboard>

        <DCArtboard id="o-4" label="04 · 47% (featured)" width={1080} height={1350}>
          <StatSlide
            page={4} total={6}
            figure="03"
            value="47"
            suffix="%"
            label="Reduction in run-rate operating spend at month six."
            body="Measured against the previous quarter's spend, with the agents and reusable surfaces handed off. The savings compound — agents stay in production after we leave."
            source="Internal · Sample N=8 engagements · 2025–26"
            featured
          />
        </DCArtboard>

        <DCArtboard id="o-5" label="05 · 92+" width={1080} height={1350}>
          <StatSlide
            page={5} total={6}
            figure="04"
            value="92"
            suffix="+"
            label="Reusable AI agents now live across engagements."
            body="Each agent is narrow, well-tested, and authored once. Subsequent engagements start further along — the library is the moat the model implies."
            source="Internal · Agent registry · Q1 2026"
          />
        </DCArtboard>

        <DCArtboard id="o-6" label="06 · CTA" width={1080} height={1350}>
          <CTASlide
            page={6} total={6}
            eyebrow="Engage"
            headline="Pick a number. We'll show our work."
            brandWord="show our work"
            body="Each figure above has a write-up. Ask for the one that matters to you."
            action="Request the brief"
            url="pointonezero.com/outcomes"
          />
        </DCArtboard>
      </DCSection>

    </DesignCanvas>
  );

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

</body>
</html>
