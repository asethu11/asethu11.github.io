<!DOCTYPE html>
<html lang="en" data-theme="light"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  .pair { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .col { border: 1px solid var(--border-light); border-radius: var(--radius-md); padding: 16px; }
  .glyphs { font-family: var(--font-display); font-weight: 650; font-size: 40px; letter-spacing: -0.03em; line-height: 1; }
  .glyphs-sans { font-family: var(--font-sans); font-weight: 600; font-size: 38px; letter-spacing: -0.02em; }
  .nm { font-size: 12px; font-weight: 600; margin-top: 12px; }
  .role { font-size: 11px; }
</style></head>
<body>
  <p class="card-label">Type pairing — two faces, no more</p>
  <div class="pair">
    <div class="col">
      <div class="glyphs">Aa Gg 24</div>
      <div class="nm">Big Shoulders Display</div>
      <div class="role mono muted">impact · headlines</div>
    </div>
    <div class="col">
      <div class="glyphs-sans">Aa Gg 24</div>
      <div class="nm">Inter</div>
      <div class="role mono muted">everything else</div>
    </div>
  </div>
</body></html>
