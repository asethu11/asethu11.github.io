<!DOCTYPE html>
<html lang="en" data-theme="light"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  .scale { display: flex; flex-direction: column; gap: 9px; }
  .s { display: flex; align-items: center; gap: 14px; }
  .bar { background: var(--primary); height: 14px; border-radius: 3px; }
  .nm { font-size: 11.5px; width: 90px; }
  .px { font-size: 11px; }
</style></head>
<body>
  <p class="card-label">Spacing — 8px base rhythm</p>
  <div class="scale">
    <div class="s"><span class="nm mono">--space-xs</span><span class="bar" style="width:4px"></span><span class="px mono muted">4px</span></div>
    <div class="s"><span class="nm mono">--space-sm</span><span class="bar" style="width:8px"></span><span class="px mono muted">8px</span></div>
    <div class="s"><span class="nm mono">--space-md</span><span class="bar" style="width:16px"></span><span class="px mono muted">16px</span></div>
    <div class="s"><span class="nm mono">--space-lg</span><span class="bar" style="width:24px"></span><span class="px mono muted">24px</span></div>
    <div class="s"><span class="nm mono">--space-xl</span><span class="bar" style="width:32px"></span><span class="px mono muted">32px</span></div>
    <div class="s"><span class="nm mono">--space-2xl</span><span class="bar" style="width:48px"></span><span class="px mono muted">48px</span></div>
    <div class="s"><span class="nm mono">--space-3xl</span><span class="bar" style="width:64px"></span><span class="px mono muted">64px</span></div>
  </div>
</body></html>
