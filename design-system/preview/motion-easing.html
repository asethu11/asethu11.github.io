<!DOCTYPE html>
<html lang="en" data-theme="light"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../motion.css">
<link rel="stylesheet" href="_card.css">
<style>
  .rows { display: flex; flex-direction: column; gap: 11px; }
  .m { display: grid; grid-template-columns: 130px 1fr 64px; align-items: center; gap: 14px; }
  .nm { font-size: 11.5px; }
  .track { height: 12px; background: var(--background-grey); border-radius: 999px; position: relative; overflow: hidden; }
  .dot { position: absolute; top: 1px; left: 1px; width: 10px; height: 10px; border-radius: 50%; background: var(--primary); }
  .d { font-size: 10.5px; text-align: right; }
  @keyframes travel { 0%,8% { left: 1px; } 50% { left: calc(100% - 11px); } 92%,100% { left: 1px; } }
  .e-standard { animation: travel 2.6s ease infinite; }
  .e-snap     { animation: travel 2.6s cubic-bezier(.2,.8,.2,1) infinite; }
  .e-emphasis { animation: travel 2.6s cubic-bezier(.4,0,.2,1) infinite; }
  .e-linear   { animation: travel 2.6s linear infinite; }
</style></head>
<body>
  <p class="card-label">Easing & duration — functional, never bouncy</p>
  <div class="rows">
    <div class="m"><span class="nm mono">ease-standard</span><span class="track"><span class="dot e-standard"></span></span><span class="d mono muted">hover</span></div>
    <div class="m"><span class="nm mono">ease-snap</span><span class="track"><span class="dot e-snap"></span></span><span class="d mono muted">UI · tilt</span></div>
    <div class="m"><span class="nm mono">ease-emphasis</span><span class="track"><span class="dot e-emphasis"></span></span><span class="d mono muted">toast</span></div>
    <div class="m"><span class="nm mono">linear</span><span class="track"><span class="dot e-linear"></span></span><span class="d mono muted">spinners</span></div>
  </div>
  <p style="font-size:11px;margin-top:14px" class="muted">Durations: <span class="mono">50ms</span> press · <span class="mono">100ms</span> ghost · <span class="mono">200ms</span> hover · <span class="mono">300ms</span> entrance/toast</p>
</body></html>
