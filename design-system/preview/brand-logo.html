<!DOCTYPE html>
<html lang="en" data-theme="light"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  .lockup { display: flex; align-items: center; gap: 26px; }
  .mark { width: 96px; height: 76px; border: 1px solid var(--border-light); border-radius: var(--radius-md); object-fit: contain; background: #FCFCFC; padding: 6px; }
  .name { font-family: var(--font-display); font-weight: 650; font-size: 42px; letter-spacing: -0.04em; line-height: 1; }
  .sub { font-size: 12px; margin-top: 6px; }
</style></head>
<body>
  <p class="card-label">Logo mark — calligraphic "a" + two bars</p>
  <div class="lockup">
    <img class="mark" src="../assets/logo.png" alt="Abseth logo mark">
    <div>
      <div class="name">abhishek</div>
      <div class="sub mono muted">abseth.com · favicon / wordmark</div>
    </div>
  </div>
</body></html>
