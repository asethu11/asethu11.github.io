<!DOCTYPE html>
<html lang="en" data-theme="light"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../components.css">
<link rel="stylesheet" href="_card.css">
<style>
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  h4 { margin: 0 0 6px; font-size: 14px; font-weight: 600; color: var(--text-bold); font-family: var(--font-sans); }
  p { margin: 0; font-size: 13px; color: var(--text-secondary); line-height: 1.5; }
</style></head>
<body>
  <p class="card-label">Surfaces — callout (filled) vs callout-border (outlined)</p>
  <div class="grid">
    <div class="callout"><h4>Filled callout</h4><p>Grey surface, no border. The default way to set content apart.</p></div>
    <div class="callout-border"><h4>Bordered callout</h4><p>Transparent fill, hairline border. Lighter visual weight.</p></div>
  </div>
</body></html>
