<!DOCTYPE html>
<html lang="en" data-theme="light"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 28px; }
  .tok { display: flex; align-items: center; gap: 10px; }
  .tok .chip { width: 30px; height: 22px; border-radius: var(--radius-sm); border: 1px solid var(--border-light); flex-shrink: 0; }
  .tok .nm { font-size: 11.5px; font-weight: 600; }
  .tok .ref { font-size: 10.5px; margin-left: auto; }
</style></head>
<body>
  <p class="card-label">Semantic tokens → reference the gray scale</p>
  <div class="grid">
    <div class="tok"><span class="chip" style="background:var(--surface-raised)"></span><span class="nm mono">--surface-raised</span><span class="ref mono muted">gray-100</span></div>
    <div class="tok"><span class="chip" style="background:var(--surface-overlay)"></span><span class="nm mono">--surface-overlay</span><span class="ref mono muted">gray-200</span></div>
    <div class="tok"><span class="chip" style="background:var(--border-default)"></span><span class="nm mono">--border-default</span><span class="ref mono muted">gray-300</span></div>
    <div class="tok"><span class="chip" style="background:var(--border-strong)"></span><span class="nm mono">--border-strong</span><span class="ref mono muted">gray-400</span></div>
    <div class="tok"><span class="chip" style="background:var(--text-tertiary)"></span><span class="nm mono">--text-tertiary</span><span class="ref mono muted">gray-500</span></div>
    <div class="tok"><span class="chip" style="background:var(--text-muted)"></span><span class="nm mono">--text-muted</span><span class="ref mono muted">gray-400</span></div>
    <div class="tok"><span class="chip" style="background:var(--divider)"></span><span class="nm mono">--divider</span><span class="ref mono muted">gray-300</span></div>
    <div class="tok"><span class="chip" style="background:var(--focus-ring)"></span><span class="nm mono">--focus-ring</span><span class="ref mono muted">primary</span></div>
  </div>
</body></html>
