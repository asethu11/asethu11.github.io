<!DOCTYPE html>
<html lang="en" data-theme="light"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../components.css">
<link rel="stylesheet" href="_card.css">
<style>
  .rows { display: flex; flex-direction: column; gap: 4px; }
  .project-row { display: flex; flex-direction: column; gap: 4px; padding: 8px 12px; margin: 0 -12px; border-radius: 8px; transition: background-color .2s ease; cursor: pointer; }
  .project-row:hover { background: var(--background-grey); }
  .project-row:hover .prt, .project-row:hover .project-tag { color: var(--primary); }
  .prt { font-size: 15px; color: var(--text-primary); }
  .sub { display: flex; gap: 8px; align-items: center; }
</style></head>
<body>
  <p class="card-label">Project row — hover to highlight (portfolio list)</p>
  <div class="rows">
    <a class="project-row">
      <span class="prt">Redesigning YouTube Music</span>
      <span class="sub"><span class="project-tag">Mar–Apr 2025</span><span class="project-tag">·</span><span class="project-tag">UI Design</span><span class="project-tag">·</span><span class="project-tag">Figma</span></span>
    </a>
    <a class="project-row">
      <span class="prt">AI-powered Project Management Tool</span>
      <span class="sub"><span class="project-tag">2025</span><span class="project-tag">·</span><span class="project-tag">Hackathon @ ASU</span><span class="project-tag">·</span><span class="project-tag">React, FastAPI</span></span>
    </a>
  </div>
</body></html>
