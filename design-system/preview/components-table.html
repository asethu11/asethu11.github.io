<!DOCTYPE html>
<html lang="en" data-theme="light"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../components.css">
<link rel="stylesheet" href="_card.css">
<style>
  table { width: 100%; border-collapse: collapse; border-radius: var(--radius-md); overflow: hidden; font-size: 13px; }
  th, td { padding: 10px 14px; text-align: left; vertical-align: top; }
  thead tr { background: var(--surface-raised); }
  th { font-weight: 600; }
  .table-first-col { font-weight: 600; background: var(--surface-base); }
</style></head>
<body>
  <p class="card-label">Table — grey header, emphasized first column</p>
  <table>
    <thead><tr><th class="table-first-col">Variable</th><th>Value</th><th>Use</th></tr></thead>
    <tbody>
      <tr><td class="table-first-col mono">--space-md</td><td class="mono">1rem</td><td>Default spacing, paragraphs</td></tr>
      <tr><td class="table-first-col mono">--space-lg</td><td class="mono">1.5rem</td><td>Section padding</td></tr>
      <tr><td class="table-first-col mono">--space-3xl</td><td class="mono">4rem</td><td>Page-level separation</td></tr>
    </tbody>
  </table>
</body></html>
