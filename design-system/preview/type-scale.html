<!DOCTYPE html>
<html lang="en" data-theme="light"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  .line { display: flex; align-items: baseline; gap: 14px; margin: 9px 0; font-family: var(--font-sans); color: var(--text-primary); }
  .line .t { line-height: 1.1; }
  .line .tag { font-size: 10.5px; margin-left: auto; }
</style></head>
<body>
  <p class="card-label">Body & headings — Inter</p>
  <div class="line"><span class="t" style="font-size:32px;font-weight:600;letter-spacing:-0.05rem;font-family:var(--font-display)">Article title</span><span class="tag mono muted">2rem · article-h1</span></div>
  <div class="line"><span class="t" style="font-size:21px;font-weight:600;letter-spacing:-0.3px">Section heading</span><span class="tag mono muted">1.3rem · h2 · 600</span></div>
  <div class="line"><span class="t" style="font-size:18px;font-weight:600">Subsection heading</span><span class="tag mono muted">1.1rem · h3 · 600</span></div>
  <div class="line"><span class="t" style="font-size:16px">Body copy at sixteen pixels, line-height 1.5.</span><span class="tag mono muted">1rem · 400</span></div>
  <div class="line"><span class="t" style="font-size:14px;color:var(--text-secondary)">Secondary text & metadata</span><span class="tag mono muted">0.9rem</span></div>
</body></html>
