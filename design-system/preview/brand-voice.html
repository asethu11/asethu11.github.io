<!DOCTYPE html>
<html lang="en" data-theme="light"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  .badge { display: inline-block; padding: 8px 12px; border: 1px solid var(--border-light); border-radius: 999px; font-size: 11px; color: var(--text-secondary); }
  .voice { margin-top: 16px; font-size: 14px; line-height: 1.6; }
  .voice .ex { color: var(--text-primary); font-weight: 500; }
  .red { color: var(--red); font-weight: 600; }
</style></head>
<body>
  <p class="card-label">Brand voice — lowercase, dry, human</p>
  <div class="badge">site coded by a human in vanilla HTML, CSS, and JavaScript.</div>
  <div class="voice">
    <span class="ex">"i'm abhishek."</span> &nbsp;·&nbsp;
    <span class="ex">"uh-bee-shake"</span> &nbsp;·&nbsp;
    <span class="ex">"I'm kinda cool."</span><br>
    <span class="ex">"Your LinkedIn just called—said it needs me <span class="red">--></span>"</span>
  </div>
</body></html>
