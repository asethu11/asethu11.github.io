<!DOCTYPE html>
<html lang="en" data-theme="light"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  .swatches { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .sw { display: flex; flex-direction: column; gap: 7px; }
  .chip { height: 56px; border-radius: var(--radius-md); border: 1px solid var(--border-light); }
  .name { font-size: 12px; font-weight: 600; }
  .hex { font-size: 11px; }
</style></head>
<body>
  <p class="card-label">Core palette — eight decisions</p>
  <div class="swatches">
    <div class="sw"><div class="chip" style="background:#FCFCFC"></div><span class="name">background</span><span class="hex mono muted">#FCFCFC</span></div>
    <div class="sw"><div class="chip" style="background:#F3F5F7"></div><span class="name">background-grey</span><span class="hex mono muted">#F3F5F7</span></div>
    <div class="sw"><div class="chip" style="background:#262628"></div><span class="name">text-primary</span><span class="hex mono muted">#262628</span></div>
    <div class="sw"><div class="chip" style="background:#737373"></div><span class="name">text-secondary</span><span class="hex mono muted">#737373</span></div>
    <div class="sw"><div class="chip" style="background:#0A0A0A"></div><span class="name">text-bold</span><span class="hex mono muted">#0A0A0A</span></div>
    <div class="sw"><div class="chip" style="background:#0070EA"></div><span class="name">primary</span><span class="hex mono muted">#0070EA</span></div>
    <div class="sw"><div class="chip" style="background:#DB4F4F"></div><span class="name">red</span><span class="hex mono muted">#DB4F4F</span></div>
    <div class="sw"><div class="chip" style="background:#8B5CF6"></div><span class="name">code-text</span><span class="hex mono muted">#8B5CF6</span></div>
  </div>
</body></html>
