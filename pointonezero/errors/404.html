<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Page not found — Point One Zero</title>
<link rel="icon" href="../assets/favicon.svg" />
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="../site.css" />
<script>(function(){try{var k=localStorage.getItem('pozTheme');var d=k?k==='dark':matchMedia('(prefers-color-scheme: dark)').matches;document.documentElement.setAttribute('data-theme',d?'dark':'light');}catch(e){}})();</script>
<script src="../theme.js" defer></script>
<style>
  html, body {
    margin: 0; min-height: 100vh;
    display: flex; align-items: stretch; justify-content: center;
  }
  body {
    flex-direction: column;
    background: var(--canvas);
    position: relative;
    overflow: hidden;
  }
  .veil {
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 50% 50% at 50% 30%, rgba(0,159,239,0.08), transparent 65%),
      radial-gradient(ellipse 60% 40% at 50% 90%, rgba(0,159,239,0.06), transparent 70%);
    pointer-events: none;
  }
  main {
    position: relative; z-index: 1;
    margin: auto; padding: 96px 24px;
    text-align: center;
    max-width: 720px;
  }
  .code {
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--foreground-subtle);
    display: inline-flex; align-items: center; gap: 10px;
    padding: 6px 14px;
    border-radius: var(--radius-full);
    background: var(--surface-1);
    border: 1px solid var(--border-subtle);
  }
  .code .brand-dot { box-shadow: var(--brand-glow); }
  h1 {
    font-size: 156px; line-height: 0.96;
    letter-spacing: -7px; font-weight: var(--weight-semibold);
    color: var(--foreground);
    margin: 36px 0 0;
    font-variant-numeric: tabular-nums;
  }
  h1 .dot { color: var(--brand); }
  p.lead {
    font: var(--font-subhead);
    letter-spacing: var(--track-subhead);
    color: var(--foreground-muted);
    margin: 32px auto 0;
    max-width: 480px;
    text-wrap: pretty;
  }
  .actions {
    margin-top: 40px;
    display: inline-flex; gap: 12px; flex-wrap: wrap; justify-content: center;
  }
  footer {
    position: relative; z-index: 1;
    border-top: 1px solid var(--border-subtle);
    padding: 24px 56px;
    display: flex; justify-content: space-between; align-items: center;
    font: var(--font-caption); color: var(--foreground-subtle);
  }
  footer .mono { font-family: var(--font-mono); }
  .theme-toggle { position: fixed; top: 20px; right: 20px; z-index: 5; }
  @media (max-width: 600px) {
    h1 { font-size: 96px; letter-spacing: -4px; }
    main { padding: 80px 20px; }
    footer { flex-direction: column; gap: 8px; text-align: center; padding: 20px; }
  }
  @media (max-width: 380px) { h1 { font-size: 72px; letter-spacing: -3px; } }
</style>
</head>
<body>

<button class="theme-toggle" type="button" aria-label="Toggle light or dark theme" aria-pressed="false"><svg class="ico-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M6.3 17.7l-1.4 1.4M19.1 4.9l-1.4 1.4"/></svg><svg class="ico-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3 7 9 0 0 0 21 12.8z"/></svg></button>

<div class="veil"></div>

<main>
  <div class="code">
    <span class="brand-dot"></span>
    HTTP 404 · No such page
  </div>
  <h1>4<span class="dot">0</span>4</h1>
  <p class="lead">This page doesn't exist — or doesn't yet. The system is intentionally small, which makes pages easy to lose track of.</p>
  <div class="actions">
    <a class="btn btn-primary btn-lg" href="../marketing/index.html">Back home</a>
    <a class="btn btn-secondary btn-lg" href="../docs/index.html">Read the notes</a>
  </div>
</main>

<footer>
  <div>© Point One Zero · 25 Palmer Square, Princeton, NJ 08542</div>
  <div class="mono">v0.4.0 · 404</div>
</footer>

</body>
</html>
